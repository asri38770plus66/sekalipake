---
layout: null
---


<center><b>Latest Posts</b></center>

{% for post in site.posts %}

<div class="post-item">
  <h2>
    <a href="{{ post.url }}">
      {{ post.title }}
    </a>
  </h2>

  <div class="excerpt">
    {{ post.description }}
  </div>

  {% assign before_svg = post.excerpt | split: '<svg' | first %}

  <div class="excerpt spo">
    {{ before_svg }}
  </div>

</div>

{% endfor %}
